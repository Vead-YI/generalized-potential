seed: 7
dtype: float64

system:
  dim: 2
  num_atoms: 3
  species: [A, B, A]
  species_ids: [0, 1, 0]
  charges: [1.0, -2.0, 1.0]
  reference_side_length: 1.0

physics:
  spring_k: 10.0
  spring_length: 1.0
  repulsion_amp: 0.2
  repulsion_sigma: 0.35
  alpha0: 0.3
  alpha1: 0.15
  alpha_rho: 0.8

sampling:
  position_noise_std: 0.08
  field_max: 0.5
  min_distance: 0.6
  max_distance: 1.8
  max_abs_energy: 20.0
  max_attempts_per_sample: 200

dataset:
  train_size: 2000
  val_size: 250
  test_size: 250
  output_dir: data/processed
  output_name: toy_dataset

model:
  species_embed_dim: 8
  atom_hidden_dim: 64
  pair_hidden_dim: 64
  atom_layers: 2
  pair_layers: 2

train:
  batch_size: 128
  epochs: 50
  lr: 0.001
  weight_decay: 0.0
  energy_weight: 1.0
  force_weight: 10.0
  response_weight: 1.0
  train_split: train
  val_split: val
